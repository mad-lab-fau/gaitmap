name: Upload Python Packages

on:
  release:
    types: [created]

jobs:
  pypi-publish-gaitmap:
    name: Upload gaitmap release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gaitmap
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - name: Build package
        run: uv build --out-dir dist
      - name: Publish package distributions to PyPI
        run: uv publish --trusted-publishing always dist/*

  pypi-publish-gaitmap_mad:
    name: Upload gaitmap_mad release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gaitmap_mad
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
      - name: Build package
        run: uv build gaitmap_mad --out-dir gaitmap_mad/dist
      - name: Publish package distributions to PyPI
        run: uv publish --trusted-publishing always gaitmap_mad/dist/*
